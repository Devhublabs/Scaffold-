services:
  backend-python:
    build: ./backend-python
    ports:
      - "8000:8000"
    volumes:
      - ./backend-python:/app
    env_file:
      - .env

  backend-node:
    build: ./backend-node
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/scaffold}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-python
      - backend-node

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: